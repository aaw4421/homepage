<!DOCTYPE html>
<html>
    <head prefix="og: http://ogp.me/ns#">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta property="og:title" content="Live Speedrunning Streams" />
        <meta property="og:description" content="Live Twitch streams, curated to include only speedrunning channels." />
        <meta property="og:url" content="https://bluecrystal.me/streams/" />
        <meta property="og:locale" content="en_US" />
        <title>Speedrun Streams</title>
        <link rel="stylesheet" href="/styles/common.css">
        <link rel="stylesheet" href="/styles/streams.css">
        <script type="module" src="/streams/index.js"></script>
        <script>
            function toggleSettingsVisibility() {
                const settingsToggleEl = document.getElementById("settings-toggle");
                const settingsPanelEl = document.getElementById("settings-panel");

                if (settingsPanelEl.style.display === "none") {
                    settingsPanelEl.style.display = "block";
                    settingsToggleEl.textContent = "Hide Settings";
                } else {
                    settingsPanelEl.style.display = "none";
                    settingsToggleEl.textContent = "Show Settings";
                }
            }
        </script>
    </head>
    <body>
        <div id="page">
            <div id="header">
                <h1 id="title">curated speedrunning streams</h1>
                <ul id="navbar"><!--# include file="~/includes/navbar.html" --></ul>
            </div>

            <div id="under-header">
                <div id="explanation" class="under-header">
                    a listing of live Twitch streams, curated by me to include only people who primarily do speedruns
                </div>
                <p id="settings-toggle" class="under-header" onclick="toggleSettingsVisibility()">Show Settings</p>
                <div id="settings-panel" style="display: none;">
                    <div id="sort-settings-container">
                        <label for="sort-dropdown">Sort by:</label>
                        <select id="sort-dropdown" name="sort">
                            <option value="random">Random</option>
                            <option value="viewers">Viewers</option>
                            <option value="channel">Channel name</option>
                            <option value="game">Game name</option>
                            <option value="language">Language</option>
                        </select>
                    </div>
                    <div id="order-settings-container">
                        <form id="order-form" name="order">
                            <label for="order">Order:</label>
                            <input id="order-asc-radio" name="order" type="radio" value="asc" checked>Ascending</input>
                            <input id="order-desc-radio"name="order" type="radio" value="desc">Descending</input>
                        </form>
                    </div>
                </div>
            </div>

            <div id="content">
                <div id="streams-container"><noscript>sorry, it requires javascript...</noscript></div>
            </div>
        </div>
    </body>
</html>
